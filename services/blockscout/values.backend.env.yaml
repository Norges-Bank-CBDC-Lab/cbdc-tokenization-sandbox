# Local sandbox values only.
# These defaults target the CBDC sandbox's single-node Kind/Besu/Blockscout setup.
# Never reuse them as production, staging, or internet-facing deployment values.

# Blockscout backend env overrides
# ref: https://docs.blockscout.com/setup/env-variables
blockscout:
  env:
    CHAIN_TYPE: "default"
    DATABASE_URL: "postgresql://ps_user:ps_user@postgres:5432/blockscout_db"
    # Use Besu variant; still point trace URL at Besu to test trace timeouts.
    ETHEREUM_JSONRPC_VARIANT: "besu"
    ETHEREUM_JSONRPC_HTTP_URL: "http://besu.besu.svc.cluster.local:8545"
    ETHEREUM_JSONRPC_TRACE_URL: "http://besu.besu.svc.cluster.local:8545"
    ETHEREUM_JSONRPC_WS_URL: "ws://besu.besu.svc.cluster.local:8546"
    ECTO_USE_SSL: false
    # Original value was: geth, switched to default
    # Dont think Besu supports this pending transactions type: must verify!
    #adding disable pending transaction
    ETHEREUM_JSONRPC_PENDING_TRANSACTIONS_TYPE: "default"

    # START INDEXER configurations
    # INDEXER_DISABLE_BLOCK_REWARD_FETCHER: "true"
    INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
    INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
    # INDEXER_DISABLE_EMPTY_BLOCKS_SANITIZER: "true"
    INDEXER_CATCHUP_BLOCKS_BATCH_SIZE: "1"
    INDEXER_CATCHUP_BLOCKS_CONCURRENCY: "1"
    INDEXER_CATCHUP_MISSING_RANGES_BATCH_SIZE: "1"
    INDEXER_INTERNAL_TRANSACTIONS_BATCH_SIZE: "1"
    INDEXER_INTERNAL_TRANSACTIONS_CONCURRENCY: "1"
    INDEXER_RECEIPTS_BATCH_SIZE: "1"
    INDEXER_RECEIPTS_CONCURRENCY: "1"
    # DISABLE_INDEXER: "false"
    DISABLE_CATCHUP_INDEXER: "true"
    # DISABLE_REALTIME_INDEXER: "true"
    # FIRST_BLOCK: "0"
    # LAST_BLOCK: "2"
    # END INDEXER configurations

    DISABLE_MARKET: "true"
    # IMPORTANT: setting this to "true" triggers a Tesla TLS option that causes
    # :badarg on plain HTTP, which then bubbles up as timeouts in the indexer.
    # Only enable if you are using HTTPS with supported TLS settings.
    ETHEREUM_JSONRPC_HTTP_INSECURE: "false"
    # RPC timeout/backoff tuning to reduce trace timeouts.
    ETHEREUM_JSONRPC_HTTP_TIMEOUT: "300"
    ETHEREUM_JSONRPC_WAIT_PER_TIMEOUT: "5"
    API_RATE_LIMIT_DISABLED: "true"
    MICROSERVICE_BENS_ENABLED: "true"
    MICROSERVICE_BENS_URL: "http://bens-service.blockscout.svc.cluster.local"
    POOL_SIZE: "10"
    POOL_SIZE_API: "10"
    # DB queue target in milliseconds; higher values tolerate brief DB spikes.
    DATABASE_QUEUE_TARGET: "2000"
