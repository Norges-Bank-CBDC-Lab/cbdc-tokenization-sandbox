# Local sandbox values only.
# These defaults target the CBDC sandbox's single-node Kind/Besu/Blockscout setup.
# Never reuse them as production, staging, or internet-facing deployment values.

# Blockscout frontend env overrides
# ref: https://github.com/blockscout/frontend/blob/main/docs/ENVS.md
frontend:
  env:
    NEXT_PUBLIC_AD_BANNER_PROVIDER: none
    NEXT_PUBLIC_AD_TEXT_PROVIDER: none
    NEXT_PUBLIC_APP_HOST: blockscout.cbdc-sandbox.local
    NEXT_PUBLIC_APP_PORT: 3000
    NEXT_PUBLIC_APP_PROTOCOL: http
    NEXT_PUBLIC_API_HOST: blockscout.cbdc-sandbox.local
    NEXT_PUBLIC_API_PORT: 80
    NEXT_PUBLIC_API_PROTOCOL: http
    NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
    NEXT_PUBLIC_NETWORK_RPC_URL: ws://besu.cbdc-sandbox.local
    NEXT_PUBLIC_NAME_SERVICE_API_HOST: http://blockscout.cbdc-sandbox.local:80
