apiVersion: apps/v1
kind: Deployment
metadata:
  name: bens-deployment
  namespace: blockscout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bens
  template:
    metadata:
      labels:
        app: bens
    spec:
      containers:
      - name: bens
        image: {{ .Values.bensImage }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8050
        env:
        - name: DATABASE_URL
          value: {{ .Values.blockscout.env.DATABASE_URL }}
        command: ["/bin/sh"]
        args:
        - "-c"
        - |
          mkdir -p /tmp/config && \
          cp /app/config/src.tar.gz /tmp/config/ && \
          tar -xzf /tmp/config/src.tar.gz -C /tmp/config && \
          python3 -m venv /venv && \
          . /venv/bin/activate && \
          pip install --upgrade pip && \
          pip install --no-cache-dir -r /tmp/config/src/requirements.txt && \
          export PYTHONPATH=/tmp/config/src && \
          uvicorn openapi_server.main:app --host 0.0.0.0 --port 8050
        volumeMounts:
        - name: bens-configmap-volume
          mountPath: /app/config
      volumes:
      - name: bens-configmap-volume
        configMap:
          name: src
