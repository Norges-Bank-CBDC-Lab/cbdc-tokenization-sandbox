apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: blockscout
spec:
  parentRefs:
  - name: gateway
    namespace: nginx-gateway
    sectionName: blockscout-http
  hostnames:
  - "blockscout.{{ .Values.rootDnsZone }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.frontendName }}
          namespace: blockscout
          port: {{ .Values.frontendPort }}
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ .Values.backendName }}
          namespace: blockscout
          port: {{ .Values.backendPort }}
    - matches:
        - path:
            type: PathPrefix
            value: /socket
      backendRefs:
        - name: {{ .Values.backendName }}
          namespace: blockscout
          port: {{ .Values.backendPort }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/
      backendRefs:
        - name: {{ .Values.bensName }}
          namespace: blockscout
          port: {{ .Values.bensPort }}
