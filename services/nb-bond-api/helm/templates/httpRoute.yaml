apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nb-bond-api
  namespace: {{ .Values.namespace | default "nb-bond-api" }}
spec:
  parentRefs:
  - name: gateway
    namespace: nginx-gateway
    sectionName: nb-bond-api-http
  hostnames:
  - "bond-api.{{ .Values.rootDnsZone | default  "cbdc-sandbox.local" }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nb-bond-api
          namespace: {{ .Values.namespace | default "nb-bond-api" }}
          port: 80
