apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jupyterhub
spec:
  parentRefs:
  - name: gateway
    namespace: nginx-gateway
    sectionName: jupyterhub-http
  hostnames:
  - "jupyterhub.{{ .Values.singleuser.extraEnv.ROOT_DNS_ZONE }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: proxy-public
          port: 80
