name: NB Bond API - Format, Lint, and Test

on:
  pull_request:
    paths:
      - "services/nb-bond-api/**"
      - ".github/workflows/nb-bond-api.yml"

jobs:
  format-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/nb-bond-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/nb-bond-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run format check
        run: npm run format:check

      - name: Run unit tests
        run: npm test
