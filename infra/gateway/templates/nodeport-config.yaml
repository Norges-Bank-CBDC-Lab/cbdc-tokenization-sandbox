apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: nginx-gateway
  labels:
    app.kubernetes.io/name: nginx-gateway-fabric
    app.kubernetes.io/instance: ngf
    app.kubernetes.io/version: "2.4.1"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: ngf
    app.kubernetes.io/managed-by: ngf-nginx
    app.kubernetes.io/name: gateway-nginx
    gateway.networking.k8s.io/gateway-name: gateway
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
      nodePort: 31437
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
      nodePort: 31438
    - name: rpc-json-http
      port: 8545
      protocol: TCP
      targetPort: 8545
      nodePort: 31439
    - name: rpc-json-ws
      port: 8546
      protocol: TCP
      targetPort: 8546
      nodePort: 31440
